<svg viewBox="0 0 960 320" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>The Relay loop: a natural-language instruction becomes a plain-English plan, pauses at an approval gate for sensitive steps, executes with screenshot and mechanical verification, and is remembered so the next run is faster</title>

  <rect x="0.5" y="0.5" width="959" height="319" rx="16" fill="#FBF7F0" stroke="#E7DFD3"/>

  <text x="40" y="46" font-size="20" font-weight="700" fill="#171310">From instruction to verified outcome.</text>
  <text x="40" y="70" font-size="13" fill="#756D60">You type it. Relay plans it in plain English. Nothing clicks until you&#8217;ve seen the plan.</text>

  <!-- connectors -->
  <g stroke="#D9CFC0" stroke-width="1.5">
    <line x1="212" y1="150" x2="238" y2="150"/>
    <line x1="410" y1="150" x2="436" y2="150"/>
    <line x1="562" y1="150" x2="588" y2="150"/>
    <line x1="760" y1="150" x2="786" y2="150"/>
  </g>

  <!-- stage halos -->
  <g fill="#6D28D9">
    <rect x="36" y="102" width="180" height="96" rx="13" opacity="0">
      <animate attributeName="opacity" values="0;0;0.2;0;0" keyTimes="0;0.03;0.08;0.14;1" dur="9s" repeatCount="indefinite"/>
    </rect>
    <rect x="234" y="102" width="180" height="96" rx="13" opacity="0">
      <animate attributeName="opacity" values="0;0;0.2;0;0" keyTimes="0;0.15;0.2;0.26;1" dur="9s" repeatCount="indefinite"/>
    </rect>
    <rect x="584" y="102" width="180" height="96" rx="13" opacity="0">
      <animate attributeName="opacity" values="0;0;0.2;0;0" keyTimes="0;0.56;0.61;0.67;1" dur="9s" repeatCount="indefinite"/>
    </rect>
    <rect x="782" y="102" width="142" height="96" rx="13" opacity="0">
      <animate attributeName="opacity" values="0;0;0.2;0;0" keyTimes="0;0.7;0.75;0.81;1" dur="9s" repeatCount="indefinite"/>
    </rect>
  </g>
  <!-- approval gate halo: amber, holds while paused -->
  <rect x="432" y="102" width="134" height="96" rx="13" fill="#E8A13C" opacity="0">
    <animate attributeName="opacity" values="0;0;0.3;0.12;0.3;0.12;0.3;0;0" keyTimes="0;0.27;0.31;0.35;0.39;0.43;0.47;0.53;1" dur="9s" repeatCount="indefinite"/>
  </rect>

  <!-- stage cards -->
  <g>
    <rect x="40" y="106" width="172" height="88" rx="11" fill="#FFFFFF" stroke="#6D28D9" stroke-width="1.5"/>
    <text x="56" y="130" font-size="13.5" font-weight="700" fill="#171310">Instruction</text>
    <text x="56" y="150" font-size="10.3" fill="#756D60">&#8220;do the morning report&#8221;</text>
    <text x="56" y="165" font-size="10.3" fill="#756D60">specific or loose &#8212;</text>
    <text x="56" y="180" font-size="10.3" fill="#756D60">natural language in</text>

    <rect x="238" y="106" width="172" height="88" rx="11" fill="#FFFFFF" stroke="#6D28D9" stroke-width="1.5"/>
    <text x="254" y="130" font-size="13.5" font-weight="700" fill="#171310">Plan</text>
    <text x="254" y="150" font-size="10.3" fill="#756D60">shown in plain English</text>
    <text x="254" y="165" font-size="10.3" fill="#756D60">before any clicks &#8212;</text>
    <text x="254" y="180" font-size="10.3" fill="#756D60">cancel with no harm done</text>

    <rect x="436" y="106" width="126" height="88" rx="11" fill="#FFF9EF" stroke="#E8A13C" stroke-width="1.5"/>
    <text x="499" y="130" font-size="13.5" font-weight="700" fill="#171310" text-anchor="middle">Approval gate</text>
    <text x="499" y="150" font-size="10.3" fill="#8A6A33" text-anchor="middle">sensitive steps pause:</text>
    <text x="499" y="165" font-size="10.3" fill="#8A6A33" text-anchor="middle">send &#183; pay &#183; post</text>
    <text x="499" y="180" font-size="10.3" font-weight="700" fill="#B07A1E" text-anchor="middle">waits for you</text>

    <rect x="588" y="106" width="172" height="88" rx="11" fill="#FFFFFF" stroke="#6D28D9" stroke-width="1.5"/>
    <text x="604" y="130" font-size="13.5" font-weight="700" fill="#171310">Execute + verify</text>
    <text x="604" y="150" font-size="10.3" fill="#756D60">screenshot checks &#183; OS-level</text>
    <text x="604" y="165" font-size="10.3" fill="#756D60">postconditions &#8212; verified /</text>
    <text x="604" y="180" font-size="10.3" fill="#756D60">failed / unverifiable</text>

    <rect x="786" y="106" width="138" height="88" rx="11" fill="#FFFFFF" stroke="#6D28D9" stroke-width="1.5"/>
    <text x="802" y="130" font-size="13.5" font-weight="700" fill="#171310">Remember</text>
    <text x="802" y="150" font-size="10.3" fill="#756D60">artifacts saved &#183;</text>
    <text x="802" y="165" font-size="10.3" fill="#756D60">procedures noted &#183;</text>
    <text x="802" y="180" font-size="10.3" fill="#756D60">skills distilled</text>
  </g>

  <!-- traveling pulse: pauses at the gate -->
  <circle r="8" fill="#8B5CF6" opacity="0">
    <set attributeName="opacity" to="0.22" begin="0s"/>
    <animateMotion dur="9s" repeatCount="indefinite" calcMode="linear"
      keyPoints="0;0.28;0.47;0.47;1;1" keyTimes="0;0.12;0.25;0.5;0.82;1"
      path="M20 150 L940 150"/>
  </circle>
  <circle r="4.5" fill="#6D28D9" opacity="0">
    <set attributeName="opacity" to="1" begin="0s"/>
    <animateMotion dur="9s" repeatCount="indefinite" calcMode="linear"
      keyPoints="0;0.28;0.47;0.47;1;1" keyTimes="0;0.12;0.25;0.5;0.82;1"
      path="M20 150 L940 150"/>
  </circle>

  <!-- "click continue" appears while paused -->
  <text x="499" y="222" font-size="10.5" font-weight="700" fill="#B07A1E" text-anchor="middle" opacity="0">you click continue &#8594;
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.3;0.34;0.48;0.52;1" dur="9s" repeatCount="indefinite"/>
  </text>

  <!-- memory loop back -->
  <path d="M855 198 C855 244 324 244 324 198" fill="none" stroke="#6D28D9" stroke-width="1.4" stroke-dasharray="5 4" opacity="0.45"/>
  <circle r="4" fill="#6D28D9" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.84;0.86;0.97;0.99;1" dur="9s" repeatCount="indefinite"/>
    <animateMotion dur="9s" repeatCount="indefinite" calcMode="linear" keyPoints="0;0;1;1" keyTimes="0;0.84;0.99;1" path="M855 198 C855 244 324 244 324 198"/>
  </circle>
  <text x="590" y="262" font-size="10.5" fill="#6A3FC7" text-anchor="middle">remembered procedures make the next plan shorter and faster &#8212; a 30-day half-life keeps stale habits out</text>

  <text x="40" y="298" font-size="11" fill="#9A9284">Verification ships in shadow mode by default &#8212; it logs verdicts but never blocks a run until you opt in to enforcement.</text>
</svg>
